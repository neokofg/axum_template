[app]
name = "axum_template"
host = "127.0.0.1"
port = 3000

[database]
pool_size = 10
connection_timeout_secs = 30

[redis]
pool_size = 10

[jwt]
access_token_expires_in = "15m"
refresh_token_expires_in = "7d"

[rate_limit]
requests_per_second = 10
burst_size = 30

[logging]
level = "info"
format = "pretty"
